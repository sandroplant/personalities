name: Deploy to EC2

on:
  push:
    branches:
      - main  # Adjust if using a different branch

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3  # Updated to v3

    - name: Set up Node.js
      uses: actions/setup-node@v3  # Updated to v3
      with:
        node-version: '16'  # You can change to '20' for future-proofing

    - name: Install Dependencies
      run: npm install

    - name: Build Project
      run: npm run build

    - name: Adding SSH Key
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa

    - name: Debugging SSH Connection
      run: |
        echo "Connecting to EC2"
        ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa ec2-user@54.197.63.5 "echo 'Connection Successful!'"

    - name: Deploy to EC2
      run: |
        echo "Deploying to EC2"
        scp -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa -r * ec2-user@54.197.63.5:/home/ec2-user/personalities/server
        ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa ec2-user@54.197.63.5 "cd /home/ec2-user/personalities/server && npm install && npm run build && pm2 restart all"

    - name: Start App (if not running)
      run: |
        ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa ec2-user@54.197.63.5 "pm2 start /home/ec2-user/personalities/server/dist/app.js || echo 'App already started'"
